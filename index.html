<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق عبدالكريم | Souq Abdulkarim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: #7c3aed; /* Deep Purple */
            transform: translateY(-5px);
        }
        .gradient-text {
            background: linear-gradient(90deg, #7c3aed, #ea580c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-blur {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px);
        }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-50 nav-blur p-4 border-b border-gray-800">
        <div class="max-w-6xl mx-auto flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold gradient-text">سوق عبدالكريم</h1>
                <div class="flex gap-4 text-xl">
                    <i class="fas fa-shopping-bag hover:text-orange-500 cursor-pointer"></i>
                    <i class="fas fa-bell hover:text-purple-500 cursor-pointer"></i>
                </div>
            </div>
            <div class="relative">
                <input type="text" placeholder="ابحث عن عطور، مواد غذائية، أو أزياء..." 
                       class="w-full bg-gray-900 border border-gray-700 rounded-full py-3 px-12 focus:outline-none focus:border-purple-500">
                <i class="fas fa-search absolute right-4 top-4 text-gray-500"></i>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 space-y-8">
        
        <section class="flex gap-4 overflow-x-auto py-2 no-scrollbar">
            <button class="glass-card flex-shrink-0 px-6 py-3 flex items-center gap-2 border-purple-600 bg-purple-900/20">
                <i class="fas fa-utensils text-orange-500"></i>
                <span>المطاعم</span>
            </button>
            <button class="glass-card flex-shrink-0 px-6 py-3 flex items-center gap-2">
                <i class="fas fa-spray-can text-purple-400"></i>
                <span>العطور</span>
            </button>
            <button class="glass-card flex-shrink-0 px-6 py-3 flex items-center gap-2">
                <i class="fas fa-apple-whole text-green-500"></i>
                <span>التموينات</span>
            </button>
            <button class="glass-card flex-shrink-0 px-6 py-3 flex items-center gap-2">
                <i class="fas fa-shirt text-blue-400"></i>
                <span>الأزياء</span>
            </button>
        </section>

        <section class="w-full h-48 rounded-3xl overflow-hidden relative group">
            <img src="https://images.unsplash.com/photo-1512781577229-ef7338827761?auto=format&fit=crop&q=80&w=1000" alt="Offers" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-l from-black/80 to-transparent flex flex-col justify-center px-8">
                <h2 class="text-2xl font-bold">خصومات الجمعة</h2>
                <p class="text-orange-500 font-medium">خصم يصل إلى 50% على العطور العالمية</p>
                <button class="mt-4 w-fit bg-purple-600 px-6 py-2 rounded-lg font-bold">تسوق الآن</button>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">المواد الغذائية (توصيل سريع)</h3>
                <span class="text-orange-500 text-sm cursor-pointer">عرض الكل</span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass-card p-4">
                    <img src="https://images.unsplash.com/photo-1550989460-0adf9ea622e2?auto=format&fit=crop&q=80&w=200" class="rounded-xl mb-3 w-full h-32 object-cover">
                    <h4 class="font-bold">سلة خضروات طازجة</h4>
                    <p class="text-gray-400 text-xs">توصيل خلال 20 دقيقة</p>
                    <div class="mt-2 flex justify-between items-center">
                        <span class="text-purple-400 font-bold">45.00 ريال</span>
                        <button class="bg-gray-800 p-2 rounded-lg text-orange-500">+</button>
                    </div>
                </div>
                </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">ركن الفخامة والعطور</h3>
                <span class="text-orange-500 text-sm cursor-pointer">اكتشف المزيد</span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="glass-card flex p-4 gap-4 items-center">
                    <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&q=80&w=200" class="w-24 h-24 rounded-lg object-cover">
                    <div>
                        <h4 class="font-bold">عطر Oud Royal</h4>
                        <p class="text-sm text-gray-400">الروائح الشرقية الأصيلة</p>
                        <span class="text-orange-500 font-bold block mt-2">299.00 ريال</span>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 nav-blur border-t border-gray-800 px-6 py-3 flex justify-between items-center">
        <div class="flex flex-col items-center text-purple-500">
            <i class="fas fa-home text-xl"></i>
            <span class="text-xs mt-1">الرئيسية</span>
        </div>
        <div class="flex flex-col items-center text-gray-500">
            <i class="fas fa-th-large text-xl"></i>
            <span class="text-xs mt-1">الأقسام</span>
        </div>
        <div class="flex flex-col items-center text-gray-500">
            <i class="fas fa-wallet text-xl"></i>
            <span class="text-xs mt-1">المحفظة</span>
        </div>
        <div class="flex flex-col items-center text-gray-500">
            <i class="fas fa-user text-xl"></i>
            <span class="text-xs mt-1">حسابي</span>
        </div>
    </nav>

</body>
</html>
